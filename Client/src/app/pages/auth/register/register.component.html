<div class="min-vh-100 d-flex align-items-center justify-content-center vp-auth-bg py-4">
  <div class="card shadow-lg border-0" style="width:100%;max-width:600px;">
    <div class="card-body p-5">
      <!-- Header -->
      <div class="text-center mb-4">
        <div class="vp-logo-circle mx-auto mb-3">
          <i class="bi bi-building text-white fs-3"></i>
        </div>
        <h4 class="fw-bold mb-0">Vendor Portal</h4>
        <p class="text-muted small">Inner Eye Consultancy Solutions</p>
      </div>

      <h5 class="fw-semibold mb-4">Create Account</h5>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
        <div class="row g-3">
          <!-- Full Name -->
          <div class="col-md-6">
            <label class="form-label fw-medium">Full Name <span class="text-danger">*</span></label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person-badge"></i></span>
              <input formControlName="fullName" type="text" class="form-control"
                     [class.is-invalid]="f['fullName'].invalid && f['fullName'].touched"
                     placeholder="Enter full name" />
              <div class="invalid-feedback">Full name required (min 2 chars)</div>
            </div>
          </div>

          <!-- Username -->
          <div class="col-md-6">
            <label class="form-label fw-medium">Username <span class="text-danger">*</span></label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-at"></i></span>
              <input formControlName="username" type="text" class="form-control"
                     [class.is-invalid]="f['username'].invalid && f['username'].touched"
                     placeholder="Choose username" />
              <div class="invalid-feedback">Username required (3–50 chars)</div>
            </div>
          </div>

          <!-- Email -->
          <div class="col-md-6">
            <label class="form-label fw-medium">Email Address <span class="text-danger">*</span></label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-envelope"></i></span>
              <input formControlName="email" type="email" class="form-control"
                     [class.is-invalid]="f['email'].invalid && f['email'].touched"
                     placeholder="Enter email" />
              <div class="invalid-feedback">Valid email is required</div>
            </div>
          </div>

          <!-- Password -->
          <div class="col-md-6">
            <label class="form-label fw-medium">Password <span class="text-danger">*</span></label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input formControlName="password" [type]="showPwd ? 'text' : 'password'" class="form-control"
                     [class.is-invalid]="f['password'].invalid && f['password'].touched"
                     placeholder="Min 8 chars" />
              <button type="button" class="input-group-text btn btn-outline-secondary" (click)="showPwd = !showPwd">
                <i [class]="showPwd ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
              </button>
              <div class="invalid-feedback">8+ chars with upper, lower, digit &amp; special char</div>
            </div>
          </div>
        </div>

        <!-- Alerts -->
        <div *ngIf="errorMsg" class="alert alert-danger mt-3 py-2 small">
          <i class="bi bi-exclamation-circle me-1"></i>{{ errorMsg }}
        </div>
        <div *ngIf="successMsg" class="alert alert-success mt-3 py-2 small">
          <i class="bi bi-check-circle me-1"></i>{{ successMsg }}
        </div>

        <button type="submit" class="btn btn-primary w-100 mt-4" [disabled]="loading">
          <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
          {{ loading ? 'Creating account...' : 'Create Account' }}
        </button>
      </form>

      <div class="mt-3 text-center small">
        <a routerLink="/auth/login"><i class="bi bi-arrow-left me-1"></i>Already have an account? Sign in</a>
      </div>
    </div>
  </div>
</div>
