<div class="min-vh-100 d-flex align-items-center justify-content-center vp-auth-bg">
  <div class="card shadow-lg border-0" style="width:100%;max-width:440px;">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <div class="vp-logo-circle mx-auto mb-3">
          <i class="bi bi-key text-white fs-3"></i>
        </div>
        <h4 class="fw-bold mb-0">Reset Password</h4>
        <p class="text-muted small">Enter your email, OTP, and new password</p>
      </div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
        <!-- Email -->
        <div class="mb-3">
          <label class="form-label fw-medium">Email Address</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input formControlName="email" type="email" class="form-control"
                   [class.is-invalid]="f['email'].invalid && f['email'].touched"
                   placeholder="Registered email" />
            <div class="invalid-feedback">Valid email required</div>
          </div>
        </div>

        <!-- OTP -->
        <div class="mb-3">
          <label class="form-label fw-medium">OTP</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-shield-lock"></i></span>
            <input formControlName="otp" type="text" class="form-control"
                   [class.is-invalid]="f['otp'].invalid && f['otp'].touched"
                   placeholder="Enter OTP" />
            <div class="invalid-feedback">OTP is required</div>
          </div>
        </div>

        <!-- New Password -->
        <div class="mb-3">
          <label class="form-label fw-medium">New Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
            <input formControlName="newPassword" [type]="showPwd ? 'text' : 'password'" class="form-control"
                   [class.is-invalid]="f['newPassword'].invalid && f['newPassword'].touched"
                   placeholder="Min 8 characters" />
            <button type="button" class="input-group-text btn btn-outline-secondary" (click)="showPwd = !showPwd">
              <i [class]="showPwd ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
            </button>
            <div class="invalid-feedback">Password must be at least 8 chars</div>
          </div>
        </div>

        <div *ngIf="errorMsg" class="alert alert-danger py-2 small">
          <i class="bi bi-exclamation-circle me-1"></i>{{ errorMsg }}
        </div>
        <div *ngIf="successMsg" class="alert alert-success py-2 small">
          <i class="bi bi-check-circle me-1"></i>{{ successMsg }}
        </div>

        <button type="submit" class="btn btn-primary w-100" [disabled]="loading">
          <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
          {{ loading ? 'Resetting...' : 'Reset Password' }}
        </button>
      </form>

      <div class="mt-3 text-center small">
        <a routerLink="/auth/login"><i class="bi bi-arrow-left me-1"></i>Back to Sign In</a>
      </div>
    </div>
  </div>
</div>
